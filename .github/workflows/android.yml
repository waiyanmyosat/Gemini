name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Use Node 24 to avoid the deprecation errors you saw earlier
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        # Specifying a version since the wrapper script (gradlew) is missing
        gradle-version: 8.9
        # Disabling cache avoids that "400 Bad Request" error from your logs
        cache-disabled: true

    - name: Build Debug APK
      # Using system 'gradle' because gradlew is not present in the repository
      run: gradle assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: gemini-ai-debug
        path: app/build/outputs/apk/debug/*.apk
