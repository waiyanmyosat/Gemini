name: Android CI - Optimized Unsigned

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.9

    - name: Make Gradlew Executable
      run: chmod +x gradlew

    - name: Build Optimized Release APK
      # 'clean' ensures no old cache bloat
      # 'assembleRelease' creates the unsigned release APK
      run: ./gradlew clean assembleRelease

    - name: Upload Unsigned APK
      uses: actions/upload-artifact@v4
      with:
        name: Gemini-Unsigned-Optimized-APK
        path: app/build/outputs/apk/release/*-unsigned.apk
