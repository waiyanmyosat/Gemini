name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Use Node 24 to avoid the deprecation errors
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.9
        # Disabling cache avoids the "400 Bad Request" error
        cache-disabled: true

    - name: Build Optimized Release APK
      # This task triggers the R8/Minify optimizations set in build.gradle
      run: gradle assembleRelease

    - name: Sign Release APK
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.SIGNING_KEY }}
        alias: ${{ secrets.ALIAS }}
        keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}
      env:
        # Standardize build tools to ensure zipalign and apksigner are found
        BUILD_TOOLS_VERSION: "34.0.0"

    - name: Upload Signed Optimized APK
      uses: actions/upload-artifact@v4
      with:
        name: gemini-ai-extreme-release
        # Using a wildcard ensures it catches the signed APK even if renamed
        path: app/build/outputs/apk/release/*.apk
        # If the build fails to produce an APK, the job will error out here
        if-no-files-found: error
